<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">U</div>
            <span>UserBase</span>
        </div>
        <nav>
            <a href="/" class="nav-item">👥 All Users</a>
            <a href="/#add-form" class="nav-item active">✏️ Edit User</a>
        </nav>
    </div>

    <div class="main">
        <div class="topbar">
            <div>
                <h1>Edit User</h1>
                <p>Update user information below</p>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <div class="card-header">
                    <h2>✏️ Edit User — {{ user.name }}</h2>
                    <p>Update the details below</p>
                </div>
                <form method="POST" class="form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="name" value="{{ user.name }}" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" name="email" value="{{ user.email }}" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" name="phone" value="{{ user.phone or '' }}">
                        </div>
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" name="age" value="{{ user.age or '' }}" min="1" max="120">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" name="city" value="{{ user.city or '' }}">
                        </div>
                    </div>
                    <div style="display:flex; gap:12px;">
                        <button type="submit" class="btn-primary">💾 Save Changes</button>
                        <a href="/" class="btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
